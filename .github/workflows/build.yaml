name: Build APK with Melange

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build APK
        uses: chainguard-dev/actions/melange-build@main
        with:
          config: build.yaml
          arch: x86_64
